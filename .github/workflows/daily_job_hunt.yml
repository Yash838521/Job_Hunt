name: Daily Job Hunt
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic fpdf2
      - name: Run script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python tailor_applications.py
      - name: Upload Cover Letters
        uses: actions/upload-artifact@v4
        with:
          name: daily-cover-letters
          path: Daily_Applications/*.pdf
      - name: Send Email with Attachments
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Your Daily Tailored Cover Letters"
          body: "Hello Yash, your daily job applications are ready. Please find the attached cover letters."
          to: yghorpade666@gmail.com
          from: GitHub Actions
          attachments: Daily_Applications/*.pdf
