name: Daily Job Hunt
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic fpdf
      - name: Run script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python tailor_applications.py
      - name: Upload Cover Letters
        uses: actions/upload-artifact@v4
        with:
          name: daily-cover-letters
          path: Daily_Applications/*.pdf
